<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>追番记 v6.0</title>
<link rel="stylesheet" href="https://gcore.jsdelivr.net/npm/font-awesome@4/css/font-awesome.min.css">
<style>

:root{--bg:#0b0b1a;--bg2:#1a1a2e;--card:rgba(21,21,36,.7);--card-hover:rgba(28,28,46,.85);--border:#252540;--primary:#e94560;--primary-hover:#ff5a75;--primary-dim:rgba(233,69,96,.15);--primary-glow:rgba(233,69,96,.3);--text:#e8e8f0;--text2:#8888aa;--text3:#555570;--success:#2ecc71;--orange:#f39c12;--radius:12px;--radius-sm:8px;--shadow:0 2px 12px rgba(0,0,0,.25);--shadow-lg:0 8px 32px rgba(0,0,0,.4);--transition:.25s cubic-bezier(.4,0,.2,1);--font:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",sans-serif}
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
input,textarea,select{-webkit-user-select:auto;user-select:auto}
html{scroll-behavior:smooth}
body{font-family:var(--font);min-height:100vh;background:linear-gradient(135deg,var(--bg)0%,var(--bg2)50%,#16213e 100%);background-attachment:fixed;color:var(--text)}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80%50%at 50%-20%,rgba(233,69,96,.1)0%,transparent 60%),radial-gradient(ellipse 50%40%at 80%80%,rgba(46,204,113,.06)0%,transparent 50%),radial-gradient(ellipse 40%30%at 20%70%,rgba(52,152,219,.06)0%,transparent 50%);pointer-events:none;z-index:0;animation:bgShift 20s ease-in-out infinite alternate}
@keyframes bgShift{0%{transform:translate(0,0)}100%{transform:translate(2%,1%)rotate(1deg)}}
input,select,textarea,button{font-family:var(--font)}
.container{max-width:1000px;margin:0 auto;padding:16px 20px;position:relative;z-index:1}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
header{display:flex;align-items:center;justify-content:space-between;padding:8px 0 12px}
header h1{font-size:22px;background:linear-gradient(135deg,var(--primary)0%,#ff8a5c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-badge{font-size:10px;vertical-align:super;background:var(--primary-dim);color:var(--primary);padding:1px 6px;border-radius:8px;-webkit-text-fill-color:var(--primary)}
.hdr-actions{display:flex;gap:6px;align-items:center}
.hdr-actions .hdr-count{font-size:12px;color:var(--text3);background:var(--card);padding:4px 10px;border-radius:10px;border:1px solid var(--border);backdrop-filter:blur(8px)}
.icon-btn{background:none;border:none;cursor:pointer;font-size:18px;padding:6px 8px;border-radius:var(--radius-sm);color:var(--text2);transition:background var(--transition)}
.icon-btn:hover{background:var(--card-hover);color:var(--text)}
.stats-row{display:flex;gap:12px;margin-bottom:14px}
.stats-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;flex:1}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;text-align:center;cursor:default;backdrop-filter:blur(8px);transition:all var(--transition)}
.stat-card:hover{background:var(--card-hover)}
.stat-card.sc-clickable{cursor:pointer}
.stat-card.sc-clickable:hover{border-color:var(--text3)}
.stat-card.sc-clickable.active{background:var(--primary-dim);border-color:var(--primary);box-shadow:0 0 16px var(--primary-glow)}
.stat-card.sc-clickable.active .sc-num{color:var(--primary)}
.stat-card.sc-clickable.active .sc-label{color:var(--primary)}
.stat-card .sc-num{font-size:20px;font-weight:700}
.stat-card .sc-label{font-size:11px;color:var(--text2);margin-top:2px;white-space:nowrap}
.donut-wrap{flex-shrink:0;width:80px;height:80px;position:relative;cursor:default}
.donut-wrap svg{width:100%;height:100%;transform:rotate(-90deg)}
.donut-wrap .donut-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);pointer-events:none}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.toolbar .search-wrap{flex:1;min-width:160px;position:relative}
.toolbar .search-wrap input{width:100%;padding:9px 12px 9px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:13px;background:var(--card);color:var(--text);outline:none;backdrop-filter:blur(8px);transition:border-color var(--transition),box-shadow var(--transition)}
.toolbar .search-wrap input:focus{border-color:var(--primary);box-shadow:0 0 12px rgba(233,69,96,.15)}
.toolbar .search-wrap .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.toolbar select{padding:9px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:12px;cursor:pointer;outline:none;backdrop-filter:blur(8px)}
.toolbar select option{background:var(--bg);color:var(--text)}
.view-toggle{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text2);cursor:pointer;font-size:16px;padding:6px 10px;transition:all var(--transition);line-height:1;backdrop-filter:blur(8px)}
.view-toggle:hover{border-color:var(--text3);color:var(--text)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;width:100%}
.filter-row select{flex:1;min-width:80px;padding:7px 8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:11px;cursor:pointer;outline:none;backdrop-filter:blur(8px)}
.filter-row select option{background:var(--bg);color:var(--text)}

.tag-filter .tag{padding:3px 10px;border:1px solid var(--border);border-radius:12px;cursor:pointer;font-size:11px;color:var(--text3);background:var(--card);transition:all var(--transition);backdrop-filter:blur(8px)}
.tag-filter .tag:hover{border-color:var(--text2);color:var(--text)}
.tag-filter .tag.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all var(--transition);position:relative;cursor:pointer;backdrop-filter:blur(12px);animation:cardIn .4s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)scale(.97)}to{opacity:1;transform:translateY(0)scale(1)}}
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:.03s}
.card:nth-child(3){animation-delay:.06s}
.card:nth-child(4){animation-delay:.09s}
.card:nth-child(5){animation-delay:.12s}
.card:nth-child(6){animation-delay:.15s}
.card:nth-child(7){animation-delay:.18s}
.card:nth-child(8){animation-delay:.21s}
.card:nth-child(9){animation-delay:.24s}
.card:nth-child(10){animation-delay:.27s}
.card:nth-child(n+11){animation-delay:.3s}
.card:hover{border-color:var(--text3);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-deleting{animation:cardShrink .3s ease forwards}
@keyframes cardShrink{to{transform:scale(.8);opacity:0;max-height:0;margin:0;padding:0;border-width:0;overflow:hidden}}
.card-cover{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;color:rgba(255,255,255,.7);position:relative;user-select:none;overflow:hidden}
.card-cover img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.card:hover .card-cover img{transform:scale(1.05)}
.cov-overlay{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:11px;text-align:center;padding:4px;backdrop-filter:blur(4px);opacity:0;transition:opacity .2s;cursor:pointer}
.card-cover:hover .cov-overlay{opacity:1}
.grid.list{display:block}
.grid.list .card{display:flex;flex-direction:row;margin-bottom:10px;cursor:pointer;animation:none;opacity:1}
.grid.list .card:hover{transform:none}
.grid.list .card-cover{width:80px;min-height:112px;height:auto;flex-shrink:0;font-size:24px;border-radius:var(--radius-sm);aspect-ratio:auto}
.grid.list .card-cover img{border-radius:var(--radius-sm)}
.grid.list .card-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px 14px;min-width:0}
.grid.list .card-title{margin-bottom:2px}
.grid.list .card-progress{margin-bottom:2px}
.grid.list .card-dates{margin-bottom:0}
.grid.list .card-footer{margin-top:4px}
.grid.list .card-actions{opacity:1}
.card-body{padding:12px 14px 14px}
.card-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.card-desc{font-size:11px;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-progress{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-progress .pb-bar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.card-progress .pb-bar .pb-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--primary),#ff8a5c);transition:width .5s cubic-bezier(.4,0,.2,1);position:relative}
.card-progress .pb-bar .pb-fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:pbShimmer 2s infinite}
@keyframes pbShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.card-progress .pb-bar .pb-fill.done{background:linear-gradient(90deg,var(--success),#27ae60)}
.card-progress .pb-bar .pb-fill.done::after{content:none}
.card-progress .pb-text{font-size:11px;color:var(--text2);white-space:nowrap;cursor:pointer}
.card-progress .pb-text:hover{color:var(--primary)}
.card-dates{font-size:11px;color:var(--text2);margin-bottom:4px}
.card-stat-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:8px;background:rgba(255,255,255,.08);color:var(--text2);white-space:nowrap;margin-left:auto;backdrop-filter:blur(4px)}
.card-footer{display:flex;justify-content:space-between;align-items:center}
.star-display{font-size:12px;letter-spacing:1px}
.star-display .star-filled{color:var(--orange)}
.star-display .star-empty{color:var(--text3)}
.star-display .star-num{color:var(--text2);font-size:11px;margin-left:2px}
.card-actions{display:flex;gap:4px;opacity:0;transition:opacity var(--transition)}
.card:hover .card-actions{opacity:1}
.card-actions button{background:none;border:none;cursor:pointer;padding:2px 4px;font-size:13px;color:var(--text2);border-radius:4px;transition:all var(--transition)}
.card-actions button:hover{background:var(--card-hover);color:var(--text)}
.card-actions .del:hover{color:var(--primary)}
.empty-state{text-align:center;padding:48px 16px;color:var(--text2);grid-column:1/-1}
.empty-state .ei{font-size:48px;margin-bottom:8px}
.empty-state p{font-size:14px;margin-bottom:12px}
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin:0 0 80px;padding:8px 0}
.pagination .page-btn{min-width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);backdrop-filter:blur(8px)}
.pagination .page-btn:hover{border-color:var(--text2);color:var(--text)}
.pagination .page-btn.active{background:var(--primary-dim);border-color:var(--primary);color:var(--primary);font-weight:600}
.pagination .page-btn:disabled{opacity:.3;cursor:default;pointer-events:none}
.pagination .page-info{font-size:12px;color:var(--text3);padding:0 4px}
.fab{position:fixed;bottom:24px;right:24px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#d63851);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 16px rgba(233,69,96,.4);transition:all var(--transition);display:flex;align-items:center;justify-content:center;z-index:50}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(233,69,96,.55)}
.fab::before{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--primary-glow);z-index:-1;animation:fabPulse 2s ease-in-out infinite}
@keyframes fabPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:0}}
.fab.fab-hidden{transform:translateY(80px);opacity:0;pointer-events:none}
.fab.fab-hidden::before{animation:none}
.search-results{margin:-6px 0 12px;max-height:240px;overflow-y:auto;display:none;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--card);backdrop-filter:blur(12px)}
.search-results.show{display:block}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px 10px;cursor:pointer;transition:background var(--transition)}
.sr-item:hover,.sr-item.sr-highlighted{background:var(--card-hover)}
.sr-item:not(:last-child){border-bottom:1px solid var(--border)}
.sr-item img{width:40px;height:56px;object-fit:cover;border-radius:4px;flex-shrink:0;background:var(--border)}
.sr-item .si-info{flex:1;min-width:0}
.sr-item .si-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-item .si-meta{font-size:11px;color:var(--text2);margin-top:1px}
.sr-loading{text-align:center;padding:16px;color:var(--text2);font-size:13px}
.sr-none{text-align:center;padding:16px;color:var(--text3);font-size:13px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;place-items:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:grid}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:700px;width:92%;overflow:auto;min-width:320px;max-height:90vh;box-shadow:var(--shadow-lg);backdrop-filter:blur(16px);animation:modalIn .25s ease both}
.modal-sm{max-width:480px}
@keyframes modalIn{from{opacity:0;transform:scale(.95)translateY(-8px)}to{opacity:1;transform:scale(1)translateY(0)}}
.modal h2{font-size:17px;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(11,11,26,.6);color:var(--text);font-size:13px;outline:none;transition:border-color var(--transition),box-shadow var(--transition)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 12px rgba(233,69,96,.12)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.star-selector{display:flex;gap:2px;align-items:center}
.star-selector .star-opt{cursor:pointer;font-size:22px;color:var(--text3);transition:color .15s,transform .15s;user-select:none;line-height:1}
.star-selector .star-opt:hover{transform:scale(1.2)}
.star-selector .star-opt.on{color:var(--orange)}
.star-selector .star-opt.off:hover{color:var(--orange)}
.star-selector .star-label{font-size:12px;color:var(--text2);margin-left:6px;min-width:24px}

.tag-chips .chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:var(--primary-dim);color:var(--primary);border-radius:10px;font-size:11px}
.tag-chips .chip .chip-del{cursor:pointer;font-weight:700;font-size:13px;line-height:1;opacity:.7}
.tag-chips .chip .chip-del:hover{opacity:1}

.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn{padding:9px 18px;border:none;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;font-weight:600;transition:all var(--transition)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#d63851);color:#fff}
.btn-primary:hover{background:linear-gradient(135deg,var(--primary-hover),#e94560);box-shadow:0 2px 12px rgba(233,69,96,.3)}
.btn-secondary{background:var(--border);color:var(--text)}
.btn-secondary:hover{background:var(--text3)}
.btn-danger{background:transparent;border:1px solid var(--primary);color:var(--primary)}
.btn-danger:hover{background:var(--primary-dim)}
.btn-success{background:linear-gradient(135deg,var(--success),#27ae60);color:#fff}
.btn-success:hover{box-shadow:0 2px 12px rgba(46,204,113,.3)}
.btn-sm{padding:6px 12px;font-size:11px}
.set-sec{margin-bottom:20px}
.set-sec h3{font-size:14px;margin-bottom:6px}
.set-sec p{font-size:12px;color:var(--text2);margin-bottom:10px}
.set-sec hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.set-sec .backup-info{font-size:11px;color:var(--text3);margin-top:6px}
.set-sec .stat-summary{font-size:12px;color:var(--text2);line-height:1.8}
.prog-popup{position:fixed;z-index:150;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow-lg);display:none;min-width:180px;backdrop-filter:blur(12px);animation:modalIn .2s ease both}
.prog-popup.show{display:block}
.prog-popup .pp-title{font-size:13px;font-weight:600;margin-bottom:8px}
.prog-popup .pp-row{display:flex;gap:6px;align-items:center}
.prog-popup .pp-row input{width:60px;padding:6px 8px;border:1px solid var(--border);border-radius:4px;background:rgba(11,11,26,.6);color:var(--text);font-size:14px;text-align:center;outline:none}
.prog-popup .pp-row input:focus{border-color:var(--primary)}
.prog-popup .pp-row span{font-size:13px;color:var(--text2)}
@keyframes confettiFall{0%{transform:translateY(0)rotate(0deg);opacity:1}100%{transform:translateY(120px)rotate(720deg);opacity:0}}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;z-index:200;pointer-events:none;animation:confettiFall 1.2s ease-out forwards}
#toastC{position:fixed;bottom:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px 18px;border-radius:var(--radius-sm);font-size:13px;box-shadow:var(--shadow-lg);animation:ti .3s cubic-bezier(.4,0,.2,1);max-width:300px;pointer-events:auto;backdrop-filter:blur(12px);display:flex;align-items:center;gap:8px}
.toast.ok{border-left:3px solid var(--success)}
.toast.err{border-left:3px solid var(--primary)}
.toast.undo{border-left:3px solid var(--orange);cursor:pointer;display:flex;align-items:center;gap:10px}
.toast.undo span{font-size:11px;color:var(--orange);white-space:nowrap}
@keyframes ti{from{transform:translateX(100%)scale(.9);opacity:0}to{transform:translateX(0)scale(1);opacity:1}}
.viewer-content{position:relative;max-width:90vw;max-height:90vh;display:flex;align-items:center;justify-content:center}
.viewer-content img{max-width:100%;max-height:85vh;border-radius:var(--radius);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.viewer-close{position:absolute;top:-32px;right:0;color:#fff;font-size:28px;cursor:pointer;opacity:.7;transition:opacity .2s}
.viewer-close:hover{opacity:1}
@media(max-width:600px){.container{padding:10px 12px}.grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}.card-cover{height:90px;font-size:30px}.card-body{padding:10px 12px}.card-title{font-size:13px}.stats-row{flex-direction:column}.stats-cards{grid-template-columns:repeat(4,1fr)}.donut-wrap{width:60px;height:60px;align-self:center}.fab{bottom:16px;right:16px;width:44px;height:44px;font-size:22px}.fab::before{content:none}.filter-row select{font-size:11px;padding:7px 6px}.prog-popup{position:fixed;top:50%!important;left:50%!important;transform:translate(-50%,-50%);min-width:220px;box-shadow:0 8px 40px rgba(0,0,0,.5)}.toast{max-width:260px;font-size:12px}.card:nth-child(n){animation-delay:0s}.modal{padding:16px}.form-row{flex-direction:column;gap:0}}

.memo-md-body h1,.memo-md-body h2,.memo-md-body h3{margin:.6em 0 .3em;color:var(--text)}.memo-md-body h1{font-size:20px}.memo-md-body h2{font-size:17px}.memo-md-body h3{font-size:14px}.memo-md-body p{margin:0 0 .5em}.memo-md-body ul{padding-left:20px;margin:0 0 .5em}.memo-md-body li{margin-bottom:4px}.memo-md-body code{background:var(--primary-dim);color:var(--primary);padding:1px 5px;border-radius:4px;font-size:12px}.memo-md-body pre{background:var(--bg);padding:12px;border-radius:var(--radius-sm);overflow-x:auto;margin:8px 0;border:1px solid var(--border)}.memo-md-body pre code{background:none;padding:0;color:var(--text)}.memo-md-body a{color:var(--primary);text-decoration:underline}.memo-md-body strong{font-weight:700}.memo-md-body em{font-style:italic}.memo-md-body img{max-width:100%;height:auto;border-radius:8px;margin:8px 0;display:block}

</style>
</head>
<body>

<div class="container" id="app">
  <header>
    <h1>动漫小屋</h1>
    <div class="hdr-actions">
      <span class="hdr-count" id="hdrCount">0 部</span>
      <button class="icon-btn" id="btnSettings" title="设置">⚙️</button>
    </div>
  </header>

<script>
(function() {
'use strict';
const SK='anime_tracker_data_v4';
const BK='anime_tracker_backup_';
const PER_PAGE=24;
const SL={all:'全部',wish:'📌 想看',watching:'▶️ 在看',completed:'✅ 已看完',dropped:'💀 弃番',paused:'⏸ 搁置'};
const SK2=['all','wish','watching','completed','dropped','paused'];
const SC={wish:'#f39c12',watching:'#3498db',completed:'#2ecc71',dropped:'#e94560',paused:'#9b59b6'};
const CC=['#e94560','#0f3460','#2ecc71','#9b59b6','#3498db','#f39c12','#1abc9c','#e67e22','#e74c3c','#2c3e50'];
let animeList=[],editingId=null,currentStatus='all',currentSearch='',currentSort='newest';
let filterYear='',filterSeason='',filterRating='';
let displayMode=localStorage.getItem(SK+'_view')||'grid';
let currentPage=1,lastScrollY=0,searchTimer2=null,coverChangingId=null;
const $=id=>document.getElementById(id);
const gridEl=$('animeGrid'),toastC=$('toastC'),searchInput=$('searchInput');
const sortSelect=$('sortSelect'),filterYearEl=$('filterYear'),filterSeasonEl=$('filterSeason');
const filterRatingEl=$('filterRating'),viewToggle=$('viewToggle'),fabAdd=$('fabAdd'),paginationEl=$('pagination');
function loadData(){try{animeList=JSON.parse(localStorage.getItem(SK))||[]}catch{animeList=[]}}
function saveData(){localStorage.setItem(SK,JSON.stringify(animeList));createBackup();updateHeaderCount();populateYearFilter()}
function genId(){return Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,6)}
function nowStr(){return new Date().toISOString().slice(0,10)}
function nowISO(){return new Date().toISOString()}
function esc(s){if(typeof s!=='string')return '';return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}


function createBackup(){try{const key=BK+nowStr();if(localStorage.getItem(key))return;const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(BK))keys.push(k)}keys.sort().reverse();if(keys.length>=30)keys.slice(29).forEach(k=>localStorage.removeItem(k));localStorage.setItem(key,JSON.stringify(animeList));updateBackupInfo()}catch{}}
function getBackupDates(){const dates=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(BK))dates.push(k.slice(BK.length))}return dates.sort().reverse()}
function updateBackupInfo(){const dates=getBackupDates();$('backupInfo').textContent=dates.length?'最近备份：'+dates.slice(0,5).join(', ')+(dates.length>5?' 等 '+dates.length+' 个':''):'暂无备份'}
function restoreFromBackup(){const dates=getBackupDates();if(!dates.length){toast('没有备份可用','err');return}const key=BK+dates[0];try{const data=JSON.parse(localStorage.getItem(key));if(!Array.isArray(data))throw Error();animeList=data;saveData();renderAll();toast('已从 '+dates[0]+' 的备份恢复')}catch{toast('备份数据损坏','err')}}
function clearBackups(){const keys=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith(BK))keys.push(k)}keys.forEach(k=>localStorage.removeItem(k));updateBackupInfo();toast('已清除所有备份')}
function fireConfetti(){const colors=['#e94560','#f39c12','#2ecc71','#3498db','#9b59b6','#ff8a5c','#1abc9c'];for(let i=0;i<24;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.left=(10+Math.random()*80)+'vw';el.style.top='-10px';el.style.width=(4+Math.random()*6)+'px';el.style.height=(4+Math.random()*6)+'px';el.style.borderRadius=Math.random()>0.5?'50%':'2px';el.style.animationDuration=(0.8+Math.random()*0.8)+'s';el.style.animationDelay=(Math.random()*0.3)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),2000)}}
function toast(msg,type){type=type||'ok';const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;toastC.appendChild(el);el.addEventListener('click',()=>remove(el));setTimeout(()=>remove(el),2800);function remove(el){if(!el.parentNode)return;el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)}}
function toastUndo(msg,undoFn){const el=document.createElement('div');el.className='toast undo';el.innerHTML=msg+' <span data-action="undo">撤销</span>';el.querySelector('[data-action="undo"]').addEventListener('click',e=>{e.stopPropagation();undoFn();el.remove()});toastC.appendChild(el);el.addEventListener('click',()=>el.remove());setTimeout(()=>{if(el.parentNode){el.style.opacity='0';el.style.transition='opacity .3s';setTimeout(()=>el.remove(),300)}},4000)}


function renderStars(r){const v=r||0;let h='';for(let i=1;i<=10;i++)h+='<span class="'+(i<=v?'star-filled':'star-empty')+'">'+(i<=v?'★':'☆')+'</span>';if(v>0)h+='<span class="star-num">'+v+'/10</span>';else h='<span class="star-empty">☆☆☆☆☆☆☆☆☆☆</span>';return '<span class="star-display">'+h+'</span>'}
function initStarSelector(v){const c=$('starSelector');if(!c)return;c.innerHTML='';for(let i=1;i<=10;i++){const s=document.createElement('span');s.className='star-opt'+(i<=v?' on':' off');s.textContent='★';s.dataset.val=i;s.addEventListener('click',()=>setStarValue(i));c.appendChild(s)}const l=document.createElement('span');l.className='star-label';l.id='starLabel';l.textContent=v>0?v+'/10':'';c.appendChild(l)}
function setStarValue(v){$('fRating').value=v;const s=$('starSelector').querySelectorAll('.star-opt');s.forEach((x,i)=>{x.className='star-opt'+(i<v?' on':' off')});const l=$('starLabel');if(l)l.textContent=v+'/10'}
function renderAll(){renderStats();renderGrid()}
function renderStats(){const t=animeList.length,w=animeList.filter(a=>a.status==='wish').length,wa=animeList.filter(a=>a.status==='watching').length,c=animeList.filter(a=>a.status==='completed').length,d=animeList.filter(a=>a.status==='dropped').length,p=animeList.filter(a=>a.status==='paused').length,r=animeList.filter(a=>a.rating>0);const avg=r.length?(r.reduce((s,a)=>s+a.rating,0)/r.length).toFixed(1):'-';$('stTotal').textContent=t;$('stWish').textContent=w;$('stWatching').textContent=wa;$('stCompleted').textContent=c;$('stDropped').textContent=d;$('stPaused').textContent=p;$('stAvg').textContent=avg}
function updateHeaderCount(){$('hdrCount').textContent=animeList.length+' 部'}
function getCoverColor(t){let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))&0x7fffffff;return CC[h%CC.length]}
function getInitial(t){const m=t.match(/[\u4e00-\u9fff]/);if(m)return m[0];return t.charAt(0).toUpperCase()}


function getFilteredAndSorted(){let arr=[...animeList];if(currentStatus!=='all')arr=arr.filter(a=>a.status===currentStatus);if(currentSearch){const q=currentSearch.toLowerCase();arr=arr.filter(a=>(a.title||'').toLowerCase().includes(q)||(a.alt_title||'').toLowerCase().includes(q)||(a.description||'').toLowerCase().includes(q)||(a.comment||'').toLowerCase().includes(q))}if(filterYear)arr=arr.filter(a=>String(a.year)===filterYear);if(filterSeason)arr=arr.filter(a=>a.season===filterSeason);if(filterRating){const v=parseInt(filterRating);arr=arr.filter(a=>a.rating===v)}switch(currentSort){case'newest':arr.sort((a,b)=>b.createdAt.localeCompare(a.createdAt));break;case'oldest':arr.sort((a,b)=>a.createdAt.localeCompare(b.createdAt));break;case'updated':arr.sort((a,b)=>{const au=a.updatedAt||a.createdAt;const bu=b.updatedAt||b.createdAt;return bu.localeCompare(au)});break;case'rating':arr.sort((a,b)=>b.rating-a.rating||b.createdAt.localeCompare(a.createdAt));break;case'title':arr.sort((a,b)=>a.title.localeCompare(b.title));break;case'progress':arr.sort((a,b)=>{const bp=b.total_episodes>0?b.watched_episodes/b.total_episodes:0;const ap=a.total_episodes>0?a.watched_episodes/a.total_episodes:0;return bp-ap});break}return arr}
function renderPagination(ti){const tp=Math.max(1,Math.ceil(ti/PER_PAGE));if(currentPage>tp)currentPage=tp;if(tp<=1){paginationEl.innerHTML='';return}let h='<button class="page-btn" id="pagePrev"'+(currentPage<=1?' disabled':'')+'>‹</button>';const r2=2,s=Math.max(1,currentPage-r2),e=Math.min(tp,currentPage+r2);if(s>1){h+='<button class="page-btn" data-page="1">1</button>';if(s>2)h+='<span class="page-info">...</span>'}for(let i=s;i<=e;i++)h+='<button class="page-btn'+(i===currentPage?' active':'')+'" data-page="'+i+'">'+i+'</button>';if(e<tp){if(e<tp-1)h+='<span class="page-info">...</span>';h+='<button class="page-btn" data-page="'+tp+'">'+tp+'</button>'}h+='<button class="page-btn" id="pageNext"'+(currentPage>=tp?' disabled':'')+'>›</button>';paginationEl.innerHTML=h;const p=$('pagePrev'),n=$('pageNext');if(p)p.addEventListener('click',()=>{if(currentPage>1){currentPage--;renderGrid()}});if(n)n.addEventListener('click',()=>{if(currentPage<tp){currentPage++;renderGrid()}});paginationEl.querySelectorAll('.page-btn[data-page]').forEach(el=>{el.addEventListener('click',()=>{currentPage=parseInt(el.dataset.page);renderGrid()})})}


function renderGrid(){const arr=getFilteredAndSorted();const ti=arr.length;const si=(currentPage-1)*PER_PAGE;const pi=arr.slice(si,si+PER_PAGE);gridEl.className='grid'+(displayMode==='list'?' list':'');if(!pi.length){const hf=currentSearch||filterYear||filterSeason||filterRating||currentStatus!=='all';gridEl.innerHTML='<div class="empty-state"><div class="ei">'+(ti?'🔍':'📭')+'</div><p>'+(animeList.length?'没有匹配的番剧':'还没有记录，点 + 添加吧')+'</p>'+(hf?'<button class="btn btn-secondary" id="clearFiltersBtn">清除筛选</button>':'')+'</div>';const cb=gridEl.querySelector('#clearFiltersBtn');if(cb)cb.addEventListener('click',clearAllFilters);renderPagination(ti);return}gridEl.innerHTML=pi.map(a=>{const pct=a.total_episodes>0?Math.min(100,Math.round((a.watched_episodes/a.total_episodes)*100)):0;const isD=a.status==='completed';const cc=getCoverColor(a.title);const init=getInitial(a.title);const desc=a.description||'';const ds=desc.length>60?desc.slice(0,60)+'…':desc;const rh=a.rating>0?'<span class="star-display">'+Array(Math.min(a.rating,10)).fill('★').join('')+Array(Math.max(0,10-a.rating)).fill('☆').join('')+'<span class="star-num">'+a.rating+'/10</span></span>':'<span class="star-display"><span class="star-empty">☆☆☆☆☆☆☆☆☆☆</span></span>';return '<div class="card" data-id="'+esc(a.id)+'"><div class="card-cover" style="background:linear-gradient(135deg,'+cc+','+cc+'88)">'+(a.cover_url?'<img src="'+esc(a.cover_url)+'" alt="" loading="lazy" onerror="this.remove()">':init)+'<div class="cov-overlay">📷 更换图片</div></div><div class="card-body"><div class="card-title" title="'+esc(a.title)+'">'+esc(a.title)+'</div>'+(ds?'<div class="card-desc">'+esc(ds)+'</div>':'')+'<div class="card-progress">'+(a.total_episodes>0?'<div class="pb-bar"><div class="pb-fill'+(isD?' done':'')+'" style="width:'+pct+'%"></div></div><span class="pb-text">'+(a.watched_episodes||0)+'/'+a.total_episodes+'</span>':'<span class="pb-text">'+(a.watched_episodes||0)+' 集</span>')+'<span class="card-stat-badge">'+(SL[a.status]||a.status)+'</span></div>'+(a.start_date||a.end_date?'<div class="card-dates">📅'+(a.start_date?' '+esc(a.start_date.replace('T',' ')):'')+(a.start_date&&a.end_date?' →':'')+(a.end_date?(a.start_date?' ':' 结束 ')+esc(a.end_date.replace('T',' ')):'')+'</div>':'')+'<div class="card-footer"><div>'+rh+'</div><div class="card-actions"><button class="act-edit">✏️</button><button class="act-del">🗑</button></div></div></div></div>'}).join('');gridEl.querySelectorAll('.card').forEach(el=>{const id=el.dataset.id;el.addEventListener('dblclick',()=>openForm(id))});gridEl.querySelectorAll('.card-cover').forEach(el=>{const id=el.closest('.card').dataset.id;el.addEventListener('dblclick',e=>{e.stopPropagation();viewCover(id)});const ov=el.querySelector('.cov-overlay');if(ov)ov.addEventListener('click',()=>changeCover(id))});gridEl.querySelectorAll('.act-edit').forEach(el=>{const id=el.closest('.card').dataset.id;el.addEventListener('click',e=>{e.stopPropagation();openForm(id)})});gridEl.querySelectorAll('.act-del').forEach(el=>{const id=el.closest('.card').dataset.id;el.addEventListener('click',e=>{e.stopPropagation();deleteAnime(id,el.closest('.card'))})});gridEl.querySelectorAll('.pb-text').forEach(el=>{const id=el.closest('.card').dataset.id;el.addEventListener('click',e=>{e.stopPropagation();showProgInput(id,el)})});renderPagination(ti)}
